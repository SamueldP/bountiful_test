<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bountiful Blossoming</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #fafafa;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh; /* Full screen height */
            background-image: url('YOUR_CAPE_TOWN_IMAGE_URL_HERE'); /* Add your image here */
            background-size: cover;
            background-position: center;
        }

        /* Transparent Navigation Overlay */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
        }

        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        /* Dropdown Styling */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: #222;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            padding: 10px 0;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            text-align: left;
        }

        .dropdown-content a:hover {
            background-color: #444;
        }

        /* Show dropdown on hover */
        .dropdown:hover .dropdown-content {
            display: block;
        }
    </style>
</head>
<body>

    <div class="hero">
        <nav>
            <div class="logo">Bountiful Blossoming</div>
            <div class="nav-links">
                <a href="#home">HOME</a>
                <a href="#testimony">MY TESTIMONY</a>
                <a href="#blog">HEALTH BLOG</a>
                
                <div class="dropdown">
                    <a href="#resources">RESOURCES ⌄</a>
                    <div class="dropdown-content">
                        <a href="#recipes">RECIPES</a>
                        <a href="#aim">AIM</a>
                        <a href="#youtube">YOUTUBE</a>
                    </div>
                </div>
            </div>
        </nav>
    </div>

</body>
</html>
